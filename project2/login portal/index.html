<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - Dummy Page</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            
            <div class="tabs">
                <button class="tab-btn active" id="tab-signin">Sign In</button>
                <button class="tab-btn" id="tab-signup">Sign Up</button>
                <div class="tab-slider"></div>
            </div>

            <div class="form-slider-container">
                <div class="form-slider" id="form-slider">
                    
                    <!-- Sign In Form -->
                    <form id="signinForm" class="auth-form">
                        <h2>Welcome Back</h2>
                        <p class="subtitle">Please sign in to your account</p>
                        
                        <div class="input-group">
                            <label for="signin-email">Email</label>
                            <input type="email" id="signin-email" required placeholder="Enter your email">
                        </div>
                        <div class="input-group">
                            <label for="signin-password">Password</label>
                            <input type="password" id="signin-password" required placeholder="Enter your password">
                        </div>
                        
                        <div class="options">
                            <label class="remember-me">
                                <input type="checkbox" name="remember"> Remember me
                            </label>
                            <a href="#" class="forgot-password">Forgot Password?</a>
                        </div>
                        
                        <button type="submit" class="submit-btn" id="signin-btn">Sign In</button>
                        
                        <div class="social-login">
                            <p>Or continue with</p>
                            <div class="social-icons">
                                <button type="button" class="social-btn">Google</button>
                                <button type="button" class="social-btn">GitHub</button>
                            </div>
                        </div>
                    </form>

                    <!-- Sign Up Form -->
                    <form id="signupForm" class="auth-form">
                        <h2>Create Account</h2>
                        <p class="subtitle">Join us to get started</p>
                        
                        <div class="input-group">
                            <label for="signup-name">Full Name</label>
                            <input type="text" id="signup-name" required placeholder="John Doe">
                        </div>
                        <div class="input-group">
                            <label for="signup-email">Email</label>
                            <input type="email" id="signup-email" required placeholder="Enter your email">
                        </div>
                        <div class="input-group">
                            <label for="signup-password">Password</label>
                            <input type="password" id="signup-password" required placeholder="Create a password">
                        </div>
                        
                        <div class="options">
                            <label class="remember-me">
                                <input type="checkbox" required> I agree to terms & conditions
                            </label>
                        </div>
                        
                        <button type="submit" class="submit-btn" id="signup-btn">Create Account</button>
                        
                        <div class="social-login">
                            <p>Or register with</p>
                            <div class="social-icons">
                                <button type="button" class="social-btn">Google</button>
                                <button type="button" class="social-btn">GitHub</button>
                            </div>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
